services:
  postgres:
    image: postgres:16-alpine
    container_name: castro_postgres
    environment:
      POSTGRES_USER: castro
      POSTGRES_PASSWORD: castro
      POSTGRES_DB: castro_agent
    ports:
      - "5434:5432"
    volumes:
      - ./postgres_data_castro:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U castro -d castro_agent"]
      interval: 5s
      timeout: 3s
      retries: 10
