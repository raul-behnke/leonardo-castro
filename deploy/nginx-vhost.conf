# Virtual host pra lucas-amc.appzoi.com.br
# Instalar em: /etc/nginx/sites-enabled/lucas-amc.appzoi.com.br
# Certbot obtém o cert: certbot --nginx -d lucas-amc.appzoi.com.br

server {
    listen 80;
    listen [::]:80;
    server_name lucas-amc.appzoi.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lucas-amc.appzoi.com.br;

    ssl_certificate /etc/letsencrypt/live/lucas-amc.appzoi.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lucas-amc.appzoi.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logs dedicados ao agente
    access_log /var/log/nginx/lucas-amc.access.log;
    error_log  /var/log/nginx/lucas-amc.error.log warn;

    # Proxy para a app container (porta local 8000 publicada via compose)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Bloqueia /metrics do acesso externo (opcional — descomente pra ativar)
    # location /metrics {
    #     allow 127.0.0.1;
    #     deny all;
    # }
}
